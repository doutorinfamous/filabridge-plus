name: filabridge

services:
  filabridge:
    image: filabridge:latest
    build: .
    container_name: filabridge
    ports:
      - "5000:5000"
    volumes:
      - filabridge_data:/app/data
      - ./data:/app/seed:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    # Spoolman URL must be configured in the FilaBridge web UI (Settings).
    # When Spoolman runs on the Docker host, use:
    #   http://host.docker.internal:8000
    # Do NOT use localhost — inside the container that refers to FilaBridge itself.

volumes:
  filabridge_data:
